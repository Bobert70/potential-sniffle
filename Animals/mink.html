  <h1>Mink</h1>
  <p>
    Mink are little carnivores that eat fresh meat. They hunt small mammels (like <a href="muskrat.html">muskrats</a>). You can trap them with <a href="../Traps/foothold.html">footholds</a> and smaller <a href="/Traps/conibear.html">conibears</a>. Bait for mink includes <a href="../Bait/fish.html">fish</a> and fresh <a href="../Bait/dead-animals.html">dead animal meat</a>.
  </p>
