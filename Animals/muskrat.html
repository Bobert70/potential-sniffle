  <h1>Muskrat</h1>
  <p>
    Muskrat are omnivorous mammels that live in water. They are hunted by <a href="mink.html">mink</a>. You can trap them with <a href="../Traps/conibear.html">conibears</a> and <a href="../Traps/foothold.html">footholds</a>. Common baits are fresh fruits and vegetables, like apples, potatoes, and carrots. They are not covered here because you know what plants are.
