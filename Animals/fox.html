  <h1>Fox</h1>
  <p>
    There are two types of foxes in Michigan - Grey Foxes and Red foxes. They are pretty similar. One is grey, one is red. You can trap them with <a href="../Traps/foothold.html">footholds</a>, but that's pretty much it. You can bait them with <a href="../Bait/dead-animals.html">dead animal meat</a> and <a href="../Bait/fish.html">fish</a>.
  </p>
