  <h1>Foothold</h1>
  <p>
    Footholds are traps designed to catch a variety of animals. They have a pad that the animal is supposed to step on. When they do, the teeth snap shut on their ankle. Make sure the trap is securely anchored to a tree or the ground so the animals doesn't run away with your trap.
